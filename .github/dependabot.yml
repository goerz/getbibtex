# Dependabot keeps the GitHub Actions used in workflows up to date. It opens a
# pull request when a newer version of an action is released.
# See https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Collapse all action bumps into a single PR instead of one per action.
    groups:
      github-actions:
        patterns:
          - "*"
